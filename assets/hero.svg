<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="TripTap travel illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8a5b"/>
      <stop offset="35%" stop-color="#ff5d8f"/>
      <stop offset="70%" stop-color="#7b5cff"/>
      <stop offset="100%" stop-color="#1f2a6b"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff2c2"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
    <linearGradient id="mountFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b4b9c"/>
      <stop offset="100%" stop-color="#2e2a6b"/>
    </linearGradient>
    <linearGradient id="mountNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2356"/>
      <stop offset="100%" stop-color="#120f33"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8d6a"/>
      <stop offset="40%" stop-color="#c264a8"/>
      <stop offset="100%" stop-color="#1a1a4a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c2" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.85">
    <circle cx="120" cy="80" r="1.4"/>
    <circle cx="220" cy="40" r="1"/>
    <circle cx="310" cy="110" r="1.6"/>
    <circle cx="480" cy="60" r="1.1"/>
    <circle cx="640" cy="30" r="1.4"/>
    <circle cx="820" cy="90" r="1"/>
    <circle cx="980" cy="50" r="1.5"/>
    <circle cx="1090" cy="120" r="1.2"/>
    <circle cx="1140" cy="40" r="1"/>
    <circle cx="60" cy="160" r="1.1"/>
  </g>

  <!-- Sun glow -->
  <circle cx="600" cy="400" r="320" fill="url(#glow)" filter="url(#soft)"/>
  <!-- Sun -->
  <circle cx="600" cy="400" r="130" fill="url(#sun)"/>
  <g stroke="#ff8a5b" stroke-width="3" opacity="0.6">
    <line x1="450" y1="330" x2="750" y2="330"/>
    <line x1="430" y1="370" x2="770" y2="370"/>
    <line x1="420" y1="410" x2="780" y2="410"/>
    <line x1="430" y1="450" x2="770" y2="450"/>
  </g>

  <!-- Distant mountains -->
  <path d="M0,470 L120,360 L220,420 L330,330 L460,430 L560,360 L700,440 L820,350 L940,430 L1080,360 L1200,440 L1200,500 L0,500 Z" fill="url(#mountFar)" opacity="0.9"/>

  <!-- Near mountains -->
  <path d="M0,520 L80,440 L200,500 L320,420 L460,520 L580,440 L720,520 L860,430 L1000,520 L1120,460 L1200,520 L1200,560 L0,560 Z" fill="url(#mountNear)"/>

  <!-- Sea -->
  <rect y="500" width="1200" height="200" fill="url(#sea)"/>
  <!-- Sun reflection -->
  <g fill="#fff2c2" opacity="0.7">
    <ellipse cx="600" cy="520" rx="120" ry="4"/>
    <ellipse cx="600" cy="540" rx="90" ry="3"/>
    <ellipse cx="600" cy="560" rx="140" ry="3"/>
    <ellipse cx="600" cy="580" rx="70" ry="2"/>
    <ellipse cx="600" cy="600" rx="160" ry="3"/>
    <ellipse cx="600" cy="625" rx="50" ry="2"/>
    <ellipse cx="600" cy="655" rx="180" ry="3"/>
  </g>

  <!-- Sailboat -->
  <g transform="translate(880,540)">
    <path d="M-40,0 L40,0 L25,18 L-25,18 Z" fill="#0e0c2b"/>
    <path d="M0,0 L0,-60 L28,0 Z" fill="#ffd9c2"/>
    <path d="M0,0 L0,-60 L-22,0 Z" fill="#ff8a5b"/>
    <line x1="0" y1="-65" x2="0" y2="0" stroke="#0e0c2b" stroke-width="2"/>
  </g>

  <!-- Airplane -->
  <g transform="translate(260,180) rotate(-8)" fill="#ffffff">
    <path d="M0,0 L70,-4 L90,0 L70,4 Z"/>
    <path d="M30,-2 L40,-22 L50,-22 L48,-2 Z"/>
    <path d="M30,2 L40,22 L50,22 L48,2 Z"/>
    <path d="M75,-1 L88,-10 L92,-10 L86,-1 Z"/>
    <path d="M75,1 L88,10 L92,10 L86,1 Z"/>
  </g>
  <path d="M-20,184 Q120,160 250,180" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="4 6"/>

  <!-- Palm tree left -->
  <g transform="translate(140,560)">
    <path d="M0,0 C-6,-60 -2,-120 4,-170" stroke="#1a1336" stroke-width="8" fill="none" stroke-linecap="round"/>
    <g fill="#0a3b2e">
      <path d="M4,-170 Q-40,-200 -80,-180 Q-40,-185 4,-170 Z"/>
      <path d="M4,-170 Q40,-210 90,-200 Q40,-195 4,-170 Z"/>
      <path d="M4,-170 Q-20,-220 -40,-250 Q0,-210 4,-170 Z"/>
      <path d="M4,-170 Q30,-220 70,-240 Q20,-205 4,-170 Z"/>
      <path d="M4,-170 Q-60,-170 -100,-150 Q-50,-165 4,-170 Z"/>
    </g>
  </g>

  <!-- Palm tree right -->
  <g transform="translate(1060,580)">
    <path d="M0,0 C6,-50 2,-110 -4,-160" stroke="#1a1336" stroke-width="7" fill="none" stroke-linecap="round"/>
    <g fill="#0a3b2e">
      <path d="M-4,-160 Q40,-190 80,-170 Q40,-175 -4,-160 Z"/>
      <path d="M-4,-160 Q-40,-200 -90,-190 Q-40,-185 -4,-160 Z"/>
      <path d="M-4,-160 Q20,-210 40,-240 Q0,-200 -4,-160 Z"/>
      <path d="M-4,-160 Q-30,-210 -70,-230 Q-20,-195 -4,-160 Z"/>
    </g>
  </g>

  <!-- Birds -->
  <g stroke="#0e0c2b" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M740,220 q10,-10 20,0 q10,-10 20,0"/>
    <path d="M800,250 q8,-8 16,0 q8,-8 16,0"/>
    <path d="M860,210 q9,-9 18,0 q9,-9 18,0"/>
  </g>
</svg>
